      description: 'GET /scenarios/{scenario_slug}/versions/{manifest_version} (api-spec
        §4.6 #29).'
      parameters:
      - in: path
        name: manifest_version
        schema:
          type: string
        required: true
      - in: path
        name: scenario_slug
        schema:
          type: string
        required: true
      tags:
      - scenarios
      security:
      - apiKeyAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManifestVersionDetail'
          description: ''
  /api/v1/scenarios/{scenario_slug}/versions/{manifest_version}/publish:
    post:
      operationId: scenarios_version_publish
      description: |-
        POST …/versions/{manifest_version}/publish (api-spec §4.6 #32).

        JWT, admin of the owning workspace. Requires the persisted ValidationReport
        passed (INV-CAT-2); derives + registers v1 schemas transactionally (R-DER).
        Unpassed validation → 409 ``conflict``; a non-additive derived schema (only on
        a re-publish minor version) → 422 with MAN-V501 errors.
      parameters:
      - in: path
        name: manifest_version
        schema:
          type: string
        required: true
      - in: path
        name: scenario_slug
        schema:
          type: string
        required: true
      tags:
      - scenarios
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManifestVersionDetail'
          description: ''
  /api/v1/scenarios/{scenario_slug}/versions/{manifest_version}/validation:
    get:
      operationId: scenarios_version_validation
      description: |-
        GET …/versions/{manifest_version}/validation (api-spec §4.6 #30).

        JWT-only (the L3 dry-run polling target). Returns the persisted §8.3
        ValidationReport; L3 dry-run lands in Phase 4, so the report's ``dry_run``
        member is ``null`` for L1+L2-only versions.
      parameters:
      - in: path
        name: manifest_version
        schema:
          type: string
        required: true
      - in: path
        name: scenario_slug
        schema:
          type: string
        required: true
      tags:
      - scenarios
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationReport'
          description: ''
  /api/v1/schemas:
    get:
      operationId: schemas_list
      description: 'GET /schemas (api-spec §4.12 #62).'
      tags:
      - schemas
      security:
      - apiKeyAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SubjectSummary'
          description: ''
  /api/v1/schemas/{subject}:
    get:
      operationId: schemas_retrieve
      description: 'GET /schemas/{subject} (api-spec §4.12 #63).'
      parameters:
      - in: path
        name: subject
        schema:
          type: string
        required: true
      tags:
      - schemas
      security:
      - apiKeyAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubjectDetail'
