openapi: 3.0.3
info:
  title: DataForge API
  version: v1
  description: Synthetic data streams for data-engineering education.
paths:
  /api/v1/auth/key-info:
    get:
      operationId: auth_key_info_retrieve
      description: |-
        GET /auth/key-info — the data-plane API-key probe (phase-doc §27).

        API-key-only: a JWT here is the wrong credential type for this surface, so we
        list only ``ApiKeyAuthentication``. No key (or a JWT) → 401 ``invalid-api-key``
        (the key surface's WWW-Authenticate). A revoked key → 401 within 1 s
        (SEC-KEY-5), which is exactly what the demo's stopwatch step asserts.
      tags:
      - auth
      security:
      - apiKeyAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KeyInfo'
          description: ''
  /api/v1/auth/login:
    post:
      operationId: auth_login_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPairResponse'
          description: ''
  /api/v1/auth/logout:
    post:
      operationId: auth_logout_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      security:
      - apiKeyAuth: []
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/auth/password-reset:
    post:
      operationId: auth_password_reset_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailOnlyRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmailOnlyRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmailOnlyRequest'
        required: true
      security:
      - {}
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /api/v1/auth/password-reset/confirm:
    post:
      operationId: auth_password_reset_confirm_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /api/v1/auth/refresh:
    post:
      operationId: auth_refresh_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPairResponse'
          description: ''
  /api/v1/auth/resend-verification:
    post:
      operationId: auth_resend_verification_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailOnlyRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmailOnlyRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmailOnlyRequest'
        required: true
      security:
      - {}
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /api/v1/auth/signup:
    post:
      operationId: auth_signup_create
      description: POST /auth/signup — create unverified account, send verification
        (§4.1).
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
