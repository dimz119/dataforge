  /api/v1/streams/{stream_id}/events:
    get:
      operationId: streams_events
      description: GET /streams/{stream_id}/events — the REST cursor pull (api-spec
        §4.9.1; §5).
      parameters:
      - in: query
        name: cursor
        schema:
          type: string
        description: Opaque resume cursor (RC-7).
      - in: query
        name: entity_key
        schema:
          type: string
        description: Per-entity CDC filter (R-CDC-7); pair with entity_type.
      - in: query
        name: entity_type
        schema:
          type: string
        description: Per-entity CDC filter (R-CDC-7); pair with entity_key.
      - in: query
        name: from
        schema:
          type: string
        description: earliest | latest | RFC-3339 start position.
      - in: query
        name: limit
        schema:
          type: integer
        description: Page size 1..1000 (default 100).
      - in: path
        name: stream_id
        schema:
          type: string
        required: true
      - in: query
        name: types
        schema:
          type: string
        description: Comma list, ≤20 event-type filter.
      tags:
      - streams
      security:
      - apiKeyAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventsPage'
          description: ''
  /api/v1/streams/{stream_id}/pause:
    post:
      operationId: streams_pause
      description: |-
        POST /streams/{stream_id}/pause (api-spec §4.8.1 #45; T5).

        Idempotent (INV-STR-3): pause on a paused-desired stream is a no-op returning
        current state. Guarded: pause is legal only from a live lifecycle
        (``running``/``starting``/``resuming``) — else 409 invalid-state-transition (T5).
        Always an explicit user pause here (``status_reason = user``); the quota/idle
        system-pause TRIGGERS are Phase 11 (the lifecycle Celery handler calls
        ``request_pause(reason=...)`` directly, not this route).
      parameters:
      - in: path
        name: stream_id
        schema:
          type: string
        required: true
      tags:
      - streams
      security:
      - apiKeyAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StreamResponse'
          description: ''
  /api/v1/streams/{stream_id}/resume:
    post:
      operationId: streams_resume
      description: |-
        POST /streams/{stream_id}/resume (api-spec §4.8.1 #46; T7).

        Idempotent (INV-STR-3): resume on a running-desired stream is a no-op. Guarded:
        resume is legal only from ``paused``/``pausing`` — else 409. If the pause reason
        was ``quota`` (Phase 11), restored headroom is required at command time
        (INV-TEN-5) → else 403 quota-exceeded (T7).
      parameters:
      - in: path
        name: stream_id
        schema:
          type: string
        required: true
      tags:
      - streams
      security:
      - apiKeyAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StreamResponse'
          description: ''
