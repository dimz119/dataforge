      type: object
      properties:
        manifest_version:
          type: string
        status:
          type: string
        published_at:
          type: string
          format: date-time
          nullable: true
      required:
      - manifest_version
      - published_at
      - status
    Workspace:
      type: object
      properties:
        workspace_id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        plan:
          type: string
        role:
          type: string
        member_count:
          type: integer
        created_at:
          type: string
          format: date-time
      required:
      - created_at
      - member_count
      - name
      - plan
      - slug
      - workspace_id
    WorkspaceCreate:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
          minLength: 1
        slug:
          type: string
          nullable: true
          pattern: ^[a-z][a-z0-9-]{2,47}$
      required:
      - name
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
