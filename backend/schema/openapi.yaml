          description: ''
    post:
      operationId: workspaces_create
      description: 'GET/POST /workspaces (api-spec §4.3, #12-13).'
      tags:
      - workspaces
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/WorkspaceCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/WorkspaceCreate'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
          description: ''
  /api/v1/workspaces/{workspace_id}:
    get:
      operationId: workspaces_retrieve
      description: 'GET/PATCH/DELETE /workspaces/{id} (api-spec §4.3, #14-16).'
      parameters:
