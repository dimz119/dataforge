        to:
          type: string
          format: date-time
          nullable: true
        from:
          type: string
          format: date-time
          nullable: true
      required:
      - from
      - to
    _DesiredState:
      type: object
      properties:
        run_state:
          type: string
        target_tps:
          type: integer
      required:
      - run_state
      - target_tps
    _StatsBuffer:
      type: object
      properties:
        earliest_available_at:
          type: string
          format: date-time
          nullable: true
        latest_event_at:
          type: string
          format: date-time
          nullable: true
        retention_hours:
          type: integer
      required:
      - earliest_available_at
      - latest_event_at
      - retention_hours
    _StatsVirtualClock:
      type: object
      properties:
        virtual_now:
          type: string
          format: date-time
          nullable: true
        speed_multiplier:
          type: number
          format: double
      required:
      - speed_multiplier
      - virtual_now
    _VirtualClock:
      type: object
      properties:
        virtual_epoch:
          type: string
          format: date-time
        speed_multiplier:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,2})?$
        virtual_now:
          type: string
          format: date-time
          nullable: true
      required:
      - speed_multiplier
      - virtual_epoch
