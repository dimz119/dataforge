components:
  schemas:
    AnswerKeyInjection:
      type: object
      description: |-
        One flattened InjectionRecord on the wire (api-spec §4.13 / event-model §7.3).

        Common fields are typed; mode-specific members (``copies``, ``delay_simulated_ms``,
        ``mutations``, …) are flattened from ``details`` and pass through as extra keys —
        this serializer documents the stable common shape, the view emits the full record.
      properties:
        injection_id:
          type: string
          format: uuid
        mode:
          type: string
        stream_id:
          type: string
          format: uuid
        shard_id:
          type: integer
        event_id:
          type: string
          format: uuid
        sequence_no:
          type: integer
        occurred_at:
          type: string
          format: date-time
        canonical_emitted_at:
          type: string
          format: date-time
        recorded_at:
          type: string
          format: date-time
      required:
      - canonical_emitted_at
      - event_id
      - injection_id
      - mode
      - occurred_at
      - recorded_at
      - sequence_no
      - shard_id
      - stream_id
    AnswerKeyInjectionsPage:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AnswerKeyInjection'
        next_cursor:
          type: string
          nullable: true
      required:
      - data
      - next_cursor
    AnswerKeySummary:
      type: object
      description: The per-mode answer-key count aggregate (api-spec §4.13 summary).
      properties:
        stream_id:
          type: string
          format: uuid
        window:
          $ref: '#/components/schemas/_AnswerKeyWindow'
        by_mode:
          type: object
          additionalProperties: {}
        total_injections:
          type: integer
        as_of:
          type: string
          format: date-time
      required:
      - as_of
      - by_mode
      - stream_id
      - total_injections
      - window
    ApiKeyCreate:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
          minLength: 1
        scopes:
          type: array
          items:
            $ref: '#/components/schemas/ScopesEnum'
          minItems: 1
        expires_at:
          type: string
          format: date-time
          nullable: true
      required:
      - name
      - scopes
    ApiKeyCreated:
      type: object
      description: The reveal-once 201 — the ONLY response carrying the plaintext
        ``key``.
      properties:
        api_key_id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        name:
          type: string
        key:
          type: string
        prefix:
          type: string
        last4:
          type: string
        scopes:
          type: array
          items:
            type: string
        state:
          type: string
        expires_at:
          type: string
          format: date-time
          nullable: true
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
      required:
      - api_key_id
      - created_at
      - created_by
      - expires_at
      - key
      - last4
      - name
      - prefix
      - scopes
      - state
      - workspace_id
    ApiKeyListItem:
      type: object
      description: List item — never carries ``key`` (api-spec §4.5).
      properties:
        api_key_id:
          type: string
          format: uuid
        name:
          type: string
        prefix:
          type: string
        last4:
          type: string
        scopes:
          type: array
          items:
            type: string
        state:
          type: string
        last_used_at:
          type: string
          format: date-time
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
      required:
      - api_key_id
      - created_at
      - created_by
      - expires_at
      - last4
      - last_used_at
      - name
      - prefix
      - scopes
      - state
    ApiKeyPage:
