      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/scenarios:
    get:
      operationId: scenarios_list
      description: 'GET/POST /scenarios (api-spec §4.6 #26, #31).'
      tags:
      - scenarios
      security:
      - apiKeyAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioPage'
          description: ''
