          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DatasetCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DatasetCreate'
        required: true
      security:
      - apiKeyAuth: []
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
