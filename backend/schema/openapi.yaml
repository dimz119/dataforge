  /api/v1/scenarios/{scenario_slug}/versions/{manifest_version}:
    get:
      operationId: scenarios_version_retrieve
      description: 'GET /scenarios/{scenario_slug}/versions/{manifest_version} (api-spec
        §4.6 #29).'
      parameters:
      - in: path
        name: manifest_version
        schema:
          type: string
        required: true
      - in: path
        name: scenario_slug
        schema:
          type: string
        required: true
      tags:
      - scenarios
      security:
      - apiKeyAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManifestVersionDetail'
          description: ''
  /api/v1/scenarios/{scenario_slug}/versions/{manifest_version}/publish:
    post:
      operationId: scenarios_version_publish
      description: |-
        POST …/versions/{manifest_version}/publish (api-spec §4.6 #32).

        JWT, admin of the owning workspace. Requires the persisted ValidationReport
        passed (INV-CAT-2); derives + registers v1 schemas transactionally (R-DER).
        Unpassed validation → 409 ``conflict``; a non-additive derived schema (only on
        a re-publish minor version) → 422 with MAN-V501 errors.
      parameters:
      - in: path
        name: manifest_version
        schema:
          type: string
        required: true
      - in: path
        name: scenario_slug
        schema:
          type: string
        required: true
      tags:
      - scenarios
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManifestVersionDetail'
          description: ''
  /api/v1/scenarios/{scenario_slug}/versions/{manifest_version}/validation:
    get:
      operationId: scenarios_version_validation
      description: |-
        GET …/versions/{manifest_version}/validation (api-spec §4.6 #30).

        JWT-only (the L3 dry-run polling target). Returns the persisted §8.3
        ValidationReport; L3 dry-run lands in Phase 4, so the report's ``dry_run``
        member is ``null`` for L1+L2-only versions.
      parameters:
      - in: path
        name: manifest_version
        schema:
          type: string
        required: true
      - in: path
        name: scenario_slug
        schema:
          type: string
        required: true
      tags:
      - scenarios
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationReport'
          description: ''
  /api/v1/schemas:
    get:
      operationId: schemas_list
      description: 'GET /schemas (api-spec §4.12 #62).'
      tags:
      - schemas
      security:
      - apiKeyAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SubjectSummary'
          description: ''
  /api/v1/schemas/{subject}:
    get:
      operationId: schemas_retrieve
      description: 'GET /schemas/{subject} (api-spec §4.12 #63).'
      parameters:
      - in: path
        name: subject
        schema:
          type: string
        required: true
      tags:
      - schemas
      security:
      - apiKeyAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubjectDetail'
          description: ''
  /api/v1/schemas/{subject}/versions:
    get:
      operationId: schemas_versions_list
      description: 'GET /schemas/{subject}/versions (api-spec §4.12 #64).'
      parameters:
      - in: path
        name: subject
        schema:
          type: string
        required: true
      tags:
      - schemas
      security:
      - apiKeyAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VersionProvenance'
          description: ''
  /api/v1/schemas/{subject}/versions/{schema_version}:
    get:
      operationId: schemas_version_retrieve
      description: |-
        GET /schemas/{subject}/versions/{version} (api-spec §4.12 #65).

        ``{version}`` is an integer or the literal ``latest``. The ``schema`` member is
        the stored document verbatim (annotations included) — what consumer pipelines
        fetch to resolve a ``schema_ref`` (exercise E5).
      parameters:
      - in: path
        name: schema_version
        schema:
          type: string
        required: true
      - in: path
        name: subject
        schema:
          type: string
        required: true
      tags:
      - schemas
      security:
      - apiKeyAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionRecord'
          description: ''
  /api/v1/users/me:
    get:
      operationId: users_me_retrieve
      description: |-
        GET/PATCH /users/me and POST /users/me/password / DELETE /users/me (§4.2).

        Memberships are injected by the Tenancy app, which subclasses or wraps this
        view to populate the `memberships` array; Identity returns the account core.
      tags:
      - users
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserMeResponse'
          description: ''
    delete:
      operationId: users_me_destroy
      description: |-
        GET/PATCH /users/me and POST /users/me/password / DELETE /users/me (§4.2).

        Memberships are injected by the Tenancy app, which subclasses or wraps this
        view to populate the `memberships` array; Identity returns the account core.
      tags:
      - users
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/users/me/password:
    post:
      operationId: users_me_password_create
      tags:
      - users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
