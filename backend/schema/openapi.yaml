          type: string
        title:
          type: string
        description:
          type: string
        visibility:
          type: string
        latest_version:
          type: string
          nullable: true
        published_versions:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        versions:
          type: array
          items:
            $ref: '#/components/schemas/VersionSummary'
      required:
      - created_at
      - description
      - latest_version
      - published_versions
      - scenario_slug
      - title
      - versions
      - visibility
    ScenarioInstance:
      type: object
      properties:
        scenario_instance_id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        name:
          type: string
        scenario_slug:
          type: string
        manifest_version:
          type: string
        config_revision:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
      - config_revision
      - created_at
      - manifest_version
      - name
      - scenario_instance_id
      - scenario_slug
      - updated_at
      - workspace_id
    ScenarioSummary:
      type: object
      properties:
        scenario_slug:
          type: string
        title:
          type: string
        description:
          type: string
        visibility:
          type: string
        latest_version:
          type: string
          nullable: true
        published_versions:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
      required:
      - created_at
      - description
      - latest_version
      - published_versions
      - scenario_slug
      - title
      - visibility
    ScopesEnum:
      enum:
      - events:read
      - streams:read
      - streams:write
      - schemas:read
      - answer_key:read
      type: string
      description: |-
        * `events:read` - events:read
        * `streams:read` - streams:read
        * `streams:write` - streams:write
        * `schemas:read` - schemas:read
        * `answer_key:read` - answer_key:read
    SignupRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          maxLength: 128
          minLength: 10
        captcha_token:
          type: string
      required:
      - email
      - password
    SignupResponse:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        is_verified:
          type: boolean
        created_at:
          type: string
          format: date-time
      required:
      - created_at
      - email
      - is_verified
      - user_id
    SubjectDetail:
      type: object
      description: 'Subject detail (#63): the summary plus created_at + per-version
        provenance.'
      properties:
        subject:
          type: string
        scenario_slug:
          type: string
        compatibility:
          type: string
        latest_version:
          type: integer
          nullable: true
        versions:
          type: array
          items:
            type: integer
        created_at:
          type: string
          format: date-time
        version_provenance:
          type: array
          items:
            $ref: '#/components/schemas/VersionProvenance'
      required:
      - compatibility
      - created_at
      - latest_version
      - scenario_slug
      - subject
      - version_provenance
      - versions
    SubjectSummary:
      type: object
      description: Subject summary (#62).
      properties:
        subject:
          type: string
        scenario_slug:
          type: string
        compatibility:
          type: string
        latest_version:
          type: integer
          nullable: true
        versions:
          type: array
          items:
            type: integer
      required:
      - compatibility
      - latest_version
      - scenario_slug
      - subject
      - versions
    TokenPairResponse:
      type: object
      description: |-
        Login / refresh body. The refresh token is **never** in the body —
        it rides the `df_refresh` HttpOnly cookie (SEC-AUTH-3); only the access
        token is returned, held in memory by the SPA (SEC-AUTH-2).
      properties:
        access_token:
          type: string
        token_type:
          type: string
          default: Bearer
        access_expires_in:
          type: integer
        refresh_expires_in:
          type: integer
      required:
      - access_expires_in
      - access_token
      - refresh_expires_in
    UserMeResponse:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        is_verified:
          type: boolean
        created_at:
          type: string
          format: date-time
        memberships:
          type: array
          items:
            $ref: '#/components/schemas/MembershipSummary'
      required:
      - created_at
      - email
      - is_verified
      - memberships
      - user_id
    ValidationReport:
      type: object
      description: |-
        The §8.3 ValidationReport (#30) — the dry-run polling target.

        ``errors``/``warnings`` are wire keys that collide with DRF's own ``Serializer``
        attributes; the ``# type: ignore[assignment]`` keeps them declared as fields
        (DRF resolves the shadowing at runtime) while documenting the §8.3 shape.
      properties:
        status:
          type: string
        schema_version:
          type: string
        errors:
          type: array
          items:
            type: object
            additionalProperties: {}
        warnings:
          type: array
          items:
            type: object
            additionalProperties: {}
        dry_run:
          type: object
          additionalProperties: {}
          nullable: true
      required:
      - status
    VerifyEmailRequest:
      type: object
      properties:
        token:
          type: string
      required:
      - token
    VerifyEmailResponse:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        is_verified:
          type: boolean
      required:
      - is_verified
      - user_id
    VersionProvenance:
      type: object
      description: 'One version''s provenance row (#63 detail, #64 list).'
      properties:
        version:
          type: integer
        registered_at:
          type: string
          format: date-time
        manifest_version:
          type: string
          nullable: true
      required:
      - manifest_version
      - registered_at
      - version
    VersionRecord:
      type: object
      description: One version's full record including the schema document (#65).
      properties:
        subject:
          type: string
        version:
          type: integer
        manifest_version:
          type: string
          nullable: true
        registered_at:
          type: string
          format: date-time
        schema:
          type: object
          additionalProperties: {}
      required:
      - manifest_version
      - registered_at
      - schema
      - subject
      - version
