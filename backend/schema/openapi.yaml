        name: workspace_id
        schema:
          type: string
        required: true
      tags:
      - workspaces
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
          description: ''
    patch:
      operationId: workspaces_update
      description: 'GET/PATCH/DELETE /workspaces/{id} (api-spec §4.3, #14-16).'
      parameters:
