      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyEmailResponse'
          description: ''
  /api/v1/datasets:
    get:
      operationId: datasets_list
      description: 'GET/POST /datasets (api-spec §4.10 #57-58).'
      tags:
      - datasets
      security:
      - apiKeyAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Dataset'
          description: ''
    post:
      operationId: datasets_create
      description: 'GET/POST /datasets (api-spec §4.10 #57-58).'
      tags:
      - datasets
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DatasetCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DatasetCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DatasetCreate'
        required: true
      security:
      - apiKeyAuth: []
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dataset'
          description: ''
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dataset'
          description: ''
  /api/v1/datasets/{dataset_id}:
    get:
      operationId: datasets_retrieve
      description: 'GET/DELETE /datasets/{dataset_id} (api-spec §4.10 #59, #61).'
      parameters:
      - in: path
        name: dataset_id
        schema:
          type: string
        required: true
      tags:
      - datasets
      security:
      - apiKeyAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dataset'
          description: ''
    delete:
      operationId: datasets_delete
      description: 'GET/DELETE /datasets/{dataset_id} (api-spec §4.10 #59, #61).'
      parameters:
      - in: path
        name: dataset_id
        schema:
          type: string
        required: true
      tags:
      - datasets
      security:
      - apiKeyAuth: []
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/datasets/{dataset_id}/download:
    get:
      operationId: datasets_download
      description: 'GET /datasets/{dataset_id}/download (api-spec §4.10.3 #60).'
      parameters:
      - in: path
        name: dataset_id
        schema:
          type: string
        required: true
      tags:
      - datasets
      security:
      - apiKeyAuth: []
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/scenarios:
    get:
      operationId: scenarios_list
      description: 'GET/POST /scenarios (api-spec §4.6 #26, #31).'
      tags:
      - scenarios
      security:
      - apiKeyAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ScenarioSummary'
          description: ''
    post:
      operationId: scenarios_create_draft
      description: 'GET/POST /scenarios (api-spec §4.6 #26, #31).'
      tags:
      - scenarios
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DraftCreate'
          application/x-www-form-urlencoded:
