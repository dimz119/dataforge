        required: true
      security:
      - apiKeyAuth: []
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManifestVersionDetail'
          description: ''
  /api/v1/scenarios/{scenario_slug}:
    get:
      operationId: scenarios_retrieve
      description: 'GET /scenarios/{scenario_slug} (api-spec §4.6 #27).'
      parameters:
      - in: path
        name: scenario_slug
        schema:
          type: string
        required: true
      tags:
      - scenarios
      security:
      - apiKeyAuth: []
      - jwtAuth: []
      responses:
