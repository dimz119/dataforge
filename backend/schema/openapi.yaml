components:
  schemas:
    ApiKeyCreate:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
          minLength: 1
        scopes:
          type: array
          items:
            $ref: '#/components/schemas/ScopesEnum'
          minItems: 1
        expires_at:
          type: string
          format: date-time
          nullable: true
      required:
      - name
      - scopes
    ApiKeyCreated:
      type: object
      description: The reveal-once 201 — the ONLY response carrying the plaintext
        ``key``.
      properties:
        api_key_id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        name:
          type: string
        key:
          type: string
        prefix:
          type: string
        last4:
          type: string
        scopes:
          type: array
          items:
            type: string
        state:
          type: string
        expires_at:
          type: string
          format: date-time
          nullable: true
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
      required:
      - api_key_id
      - created_at
      - created_by
      - expires_at
      - key
      - last4
      - name
      - prefix
      - scopes
      - state
      - workspace_id
    ApiKeyListItem:
      type: object
      description: List item — never carries ``key`` (api-spec §4.5).
      properties:
        api_key_id:
          type: string
          format: uuid
        name:
          type: string
        prefix:
          type: string
        last4:
          type: string
        scopes:
          type: array
          items:
            type: string
        state:
          type: string
        last_used_at:
          type: string
          format: date-time
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
      required:
      - api_key_id
      - created_at
      - created_by
      - expires_at
      - last4
      - last_used_at
      - name
      - prefix
      - scopes
      - state
    AuditEntry:
      type: object
      properties:
        audit_id:
          type: string
        occurred_at:
          type: string
          format: date-time
        actor:
          type: object
          additionalProperties: {}
        workspace_id:
          type: string
          format: uuid
          nullable: true
        action:
          type: string
        target:
          type: object
          additionalProperties: {}
        metadata:
          type: object
          additionalProperties: {}
        request_id:
          type: string
          nullable: true
      required:
      - action
      - actor
      - audit_id
      - metadata
      - occurred_at
      - target
      - workspace_id
    ChangePasswordRequest:
      type: object
      properties:
        current_password:
          type: string
        new_password:
          type: string
          maxLength: 128
          minLength: 10
        refresh_token:
          type: string
      required:
      - current_password
      - new_password
    CompressionEnum:
      enum:
      - gzip
      - none
      type: string
      description: |-
        * `gzip` - gzip
        * `none` - none
    Configuration:
      type: object
      description: '``GET/PUT …/configuration`` (#36/#37) — the overlay + its revision.'
      properties:
        config_revision:
          type: integer
        configuration:
          type: object
          additionalProperties: {}
      required:
      - config_revision
      - configuration
    ConfigurationReplace:
      type: object
      properties:
        configuration:
          type: object
          additionalProperties: {}
      required:
      - configuration
    Dataset:
      type: object
      description: The dataset resource (api-spec §4.10.2).
      properties:
        dataset_id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        scenario_instance_id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
        progress:
          type: number
          format: double
        seed:
          type: string
        pin_sha256:
          type: string
        simulated_window:
          type: object
          additionalProperties: {}
        estimated_events:
          type: integer
        event_count:
          type: integer
          nullable: true
        size_bytes:
          type: integer
          nullable: true
        compression:
          type: string
        created_at:
          type: string
          format: date-time
        ready_at:
          type: string
          format: date-time
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
        failure_reason:
          type: string
        download_path:
          type: string
      required:
      - compression
      - created_at
      - dataset_id
      - download_path
      - estimated_events
      - event_count
      - expires_at
      - failure_reason
      - name
      - pin_sha256
      - progress
      - ready_at
      - scenario_instance_id
      - seed
      - simulated_window
      - size_bytes
      - status
      - workspace_id
    DatasetCreate:
      type: object
      description: '``POST /datasets`` request body (api-spec §4.10.1).'
      properties:
        workspace_id:
          type: string
          format: uuid
        scenario_instance_id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 200
        seed:
          type: string
          nullable: true
        simulated_days:
          type: integer
          minimum: 1
        virtual_epoch:
          type: string
          format: date-time
          nullable: true
        compression:
          allOf:
          - $ref: '#/components/schemas/CompressionEnum'
          default: gzip
        chaos:
          type: object
          additionalProperties: {}
      required:
      - name
      - scenario_instance_id
      - simulated_days
      - workspace_id
    DetailResponse:
      type: object
      properties:
        detail:
          type: string
      required:
      - detail
    DraftCreate:
      type: object
      description: '``POST /scenarios`` — create a workspace-visibility draft (§12
        AI seam).'
      properties:
        workspace_id:
          type: string
          format: uuid
        document:
          type: object
          additionalProperties: {}
      required:
      - document
      - workspace_id
    EmailOnlyRequest:
      type: object
      description: resend-verification / password-reset request body.
      properties:
        email:
          type: string
          format: email
        captcha_token:
          type: string
