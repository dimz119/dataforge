        name: event_id
        schema:
          type: string
        description: Exact affected canonical event id.
      - in: query
        name: from
        schema:
          type: string
        description: RFC-3339 lower bound on occurred_at.
      - in: query
        name: mode
        schema:
          type: string
        description: One of the seven ChaosMode identifiers.
      - in: path
        name: stream_id
        schema:
          type: string
        required: true
      - in: query
        name: to
        schema:
          type: string
        description: RFC-3339 upper bound on occurred_at.
      tags:
      - streams
      security:
      - apiKeyAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnswerKeySummary'
          description: ''
  /api/v1/streams/{stream_id}/chaos:
    get:
      operationId: streams_chaos_get
      description: GET | PATCH /streams/{stream_id}/chaos (api-spec §4.8.3; chaos-engine
        §3.5).
      parameters:
      - in: path
        name: stream_id
        schema:
          type: string
        required: true
      tags:
      - streams
      security:
      - apiKeyAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChaosPolicyResponse'
          description: ''
    patch:
      operationId: streams_chaos_patch
      description: GET | PATCH /streams/{stream_id}/chaos (api-spec §4.8.3; chaos-engine
        §3.5).
      parameters:
      - in: path
        name: stream_id
        schema:
