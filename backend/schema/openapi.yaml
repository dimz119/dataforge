  /api/v1/schemas/{subject}/versions:
    get:
      operationId: schemas_versions_list
      description: 'GET /schemas/{subject}/versions (api-spec §4.12 #64).'
      parameters:
      - in: path
        name: subject
        schema:
          type: string
        required: true
      tags:
      - schemas
      security:
      - apiKeyAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VersionProvenance'
          description: ''
  /api/v1/schemas/{subject}/versions/{schema_version}:
    get:
      operationId: schemas_version_retrieve
      description: |-
        GET /schemas/{subject}/versions/{version} (api-spec §4.12 #65).

        ``{version}`` is an integer or the literal ``latest``. The ``schema`` member is
        the stored document verbatim (annotations included) — what consumer pipelines
        fetch to resolve a ``schema_ref`` (exercise E5).
      parameters:
      - in: path
        name: schema_version
        schema:
          type: string
        required: true
      - in: path
        name: subject
        schema:
          type: string
        required: true
      tags:
      - schemas
      security:
      - apiKeyAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionRecord'
          description: ''
  /api/v1/streams:
    get:
      operationId: streams_list
      description: 'GET/POST /streams (api-spec §4.8 #39-40).'
      parameters:
      - in: query
        name: scenario_instance_id
        schema:
          type: string
        description: Filter to streams of one scenario instance.
      - in: query
        name: status
        schema:
          type: string
        description: Comma list of lifecycle_state values to filter by.
      - in: query
        name: workspace_id
        schema:
          type: string
        description: The owning workspace UUID (W-2); absent → 404.
        required: true
      tags:
      - streams
      security:
      - apiKeyAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StreamPage'
          description: ''
    post:
      operationId: streams_create
      description: 'GET/POST /streams (api-spec §4.8 #39-40).'
      tags:
      - streams
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StreamCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/StreamCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/StreamCreate'
        required: true
      security:
      - apiKeyAuth: []
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StreamResponse'
          description: ''
  /api/v1/streams/{stream_id}:
    get:
      operationId: streams_retrieve
      description: |-
        GET | PATCH /streams/{stream_id} (api-spec §4.8 #41, §4.8.2 #47).

        A flat single-resource route (W-2): the workspace is resolved from the resource.
        The scoped manager masks a foreign stream to no-row → 404 — but the context must
        be armed first. We resolve the stream's workspace via the unscoped manager by its
        unique id, then verify the caller may see that workspace (foreign → 404), arm it,
        and re-read through the scoped manager.

        ``PATCH`` is the live mutation surface (§4.8.2): ``name``/``target_tps`` only
        (PIN-3). ``target_tps`` is bounded 1..1,000 (out of range → 400) and quota-capped
        at command time (above the plan per-stream cap → 403, INV-TEN-5); the runner picks
        it up within 2 s. Any other body key names a pinned field (PIN-4) → 400
        validation-error with ``errors[0].code = "immutable_field"``.
      parameters:
      - in: path
        name: stream_id
        schema:
          type: string
        required: true
      tags:
      - streams
      security:
      - apiKeyAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StreamResponse'
          description: ''
    patch:
      operationId: streams_patch
      description: |-
        GET | PATCH /streams/{stream_id} (api-spec §4.8 #41, §4.8.2 #47).

        A flat single-resource route (W-2): the workspace is resolved from the resource.
        The scoped manager masks a foreign stream to no-row → 404 — but the context must
        be armed first. We resolve the stream's workspace via the unscoped manager by its
        unique id, then verify the caller may see that workspace (foreign → 404), arm it,
        and re-read through the scoped manager.

        ``PATCH`` is the live mutation surface (§4.8.2): ``name``/``target_tps`` only
        (PIN-3). ``target_tps`` is bounded 1..1,000 (out of range → 400) and quota-capped
        at command time (above the plan per-stream cap → 403, INV-TEN-5); the runner picks
        it up within 2 s. Any other body key names a pinned field (PIN-4) → 400
        validation-error with ``errors[0].code = "immutable_field"``.
      parameters:
      - in: path
        name: stream_id
        schema:
          type: string
        required: true
      tags:
      - streams
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedStreamPatch'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedStreamPatch'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedStreamPatch'
      security:
      - apiKeyAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StreamResponse'
          description: ''
  /api/v1/streams/{stream_id}/answer-key/export:
    get:
      operationId: streams_answer_key_export
      description: |-
        GET /streams/{id}/answer-key/export (JSONL export of injection records).

        Streams the filtered ``chaos_injections`` records as JSONL
        (``application/x-ndjson``), one flattened record per line, newest-first — the bulk
        counterpart of the paginated injections list for offline grading. Same auth, same
        audit (``chaos.answer_key.accessed``) as the other answer-key reads.
      parameters:
      - in: query
        name: event_id
        schema:
          type: string
        description: Exact affected canonical event id.
      - in: query
        name: from
        schema:
          type: string
        description: RFC-3339 lower bound on occurred_at.
      - in: query
        name: mode
        schema:
          type: string
        description: One of the seven ChaosMode identifiers.
      - in: path
        name: stream_id
        schema:
          type: string
        required: true
      - in: query
        name: to
        schema:
          type: string
        description: RFC-3339 upper bound on occurred_at.
      tags:
      - streams
      security:
      - apiKeyAuth: []
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/streams/{stream_id}/answer-key/injections:
    get:
      operationId: streams_answer_key_injections
      description: GET /streams/{id}/answer-key/injections (api-spec §4.13; chaos-engine
        §7.3).
      parameters:
      - in: query
        name: cursor
        schema:
          type: string
        description: Opaque resume cursor (P-1).
      - in: query
        name: event_id
        schema:
          type: string
        description: Exact affected canonical event id.
      - in: query
        name: from
        schema:
          type: string
        description: RFC-3339 lower bound on occurred_at.
      - in: query
        name: limit
        schema:
          type: integer
        description: Page size 1..500 (default 100).
      - in: query
        name: mode
        schema:
          type: string
        description: One of the seven ChaosMode identifiers.
      - in: path
        name: stream_id
        schema:
          type: string
        required: true
      - in: query
        name: to
        schema:
          type: string
        description: RFC-3339 upper bound on occurred_at.
      tags:
      - streams
      security:
      - apiKeyAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnswerKeyInjectionsPage'
          description: ''
  /api/v1/streams/{stream_id}/answer-key/summary:
    get:
