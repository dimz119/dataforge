      description: 'GET/DELETE /datasets/{dataset_id} (api-spec §4.10 #59, #61).'
      parameters:
      - in: path
        name: dataset_id
        schema:
          type: string
        required: true
      tags:
      - datasets
      security:
      - apiKeyAuth: []
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/datasets/{dataset_id}/download:
    get:
      operationId: datasets_download
      description: 'GET /datasets/{dataset_id}/download (api-spec §4.10.3 #60).'
      parameters:
      - in: path
        name: dataset_id
        schema:
          type: string
        required: true
      tags:
