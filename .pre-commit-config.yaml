# DataForge pre-commit hooks — parity with CI stage 1
# (deployment-architecture §7.1; project-folder-structure §1).
# Install once per clone:  pre-commit install
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.13
    hooks:
      - id: ruff
        name: ruff check (backend)
        files: ^backend/
      - id: ruff-format
        name: ruff format (backend)
        files: ^backend/

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        name: prettier (frontend)
        files: ^frontend/
        exclude: ^frontend/(package-lock\.json|dist/|node_modules/)

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
        name: gitleaks (default rules + df_ API-key rule, SEC-KEY-1)
        args: ["--config", "infra/ci/gitleaks.toml"]
