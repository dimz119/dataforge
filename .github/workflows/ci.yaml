# DataForge CI — ONE path-filtered pipeline (ADR-0001; deployment-architecture §7).
# Backend paths trigger the backend job, frontend paths the frontend job,
# either side triggers the OpenAPI contract-artifact job (ADR-0014 lockstep);
# folder-lint runs on every PR (Phase 1 exit criterion 5).
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yaml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yaml'

  backend:
    name: backend
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    # Service containers for the Phase 2 integration lane: the cross-tenant
    # attack suite, raw-SQL RLS probes, and revocation stopwatch require a real
    # Postgres (RLS is a Postgres construct) and Redis (revocation cache).
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dataforge
          POSTGRES_PASSWORD: dataforge
          POSTGRES_DB: dataforge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dataforge -d dataforge"
          --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Sync dependencies
        run: uv sync
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Type-check (mypy)
        run: uv run mypy .
      - name: Import-boundary contracts (import-linter, backend-architecture §3.2)
        run: uv run lint-imports
      # Permanent guard grep (Phase-3 hard rule): zero e-commerce logic in Python.
      # The reference scenario is data (catalog/builtin/); the runtime is generic.
      # The pytest GUARD test asserts the same, this grep is the visible CI gate.
      - name: Guard — no e-commerce logic in Python
        run: |
          if grep -rn ecommerce . --include='*.py' \
              | grep -v catalog/builtin \
              | grep -vE '(^|/)tests?/|/test_|:[0-9]+:.*test_|ecommerce\.md' ; then
            echo "::error::e-commerce logic must never live in Python (Phase-3 hard rule)"
            exit 1
          fi
      # Engine-genericity GUARD (Phase-4 hard rule BE-T1): the behaviour engine is
      # a generic interpreter — zero scenario code, no branch/string-match on a
      # scenario slug. Scan the runtime engine source (excluding its own tests,
      # which legitimately name a sample slug) for a scenario slug as a string
      # literal — the shape control-flow branching would take.
      # The token set here mirrors tests/guards/test_engine_genericity.py (the
      # permanent pytest gate); the two must agree — slugs + scenario-specific event
      # types that would only appear as a string literal in a slug/event branch.
      - name: Guard — no scenario slugs in the engine (BE-T1)
        run: |
          if grep -rnE "['\"](ecommerce|purchase_funnel|shopping_session|order_placed|payment_authorized|user_registered|checkout_started|cart_item_added)['\"]" \
              dataforge_engine/behavior --include='*.py' \
              | grep -vE '/tests?/' ; then
            echo "::error::the behaviour engine must contain zero scenario code (BE-T1)"
            exit 1
          fi
      # Permanent gates, fail-fast (testing-strategy §6, §4.1, §17.3): the GOLD-A
      # byte-identity replay against the committed fixture, GOLD-D stop/restart
      # continuation byte-identity (Phase-6 exit #2 — restore-from-checkpoint
      # reproduces an uninterrupted run, with PROP-RI over the restarted stream),
      # and the PROP-RI-1..8 referential-integrity suite over the 100k PR profile.
      # All are pure engine + ports (no Postgres/Redis), so they run here in the
      # fast lane and gate the PR before the DB lanes. The 1M ``property_nightly``
      # profile is NOT run here (too slow; nightly + attended Phase-4 gate only) —
      # it is excluded by the pyproject ``addopts`` markexpr and never selected here.
      - name: GOLD-A/GOLD-D replay + PROP-RI (100k PR profile)
        run: uv run pytest -m "golden or property" -q
      # UNIT lane: in-memory SQLite, hermetic and fast (testing-strategy §2). The
      # default ``addopts`` deselects ``property_nightly``; this run also re-covers
      # golden/property/OPS-11 hermetically alongside the rest of the unit suite.
      # Phase 6: the WS tail unit tests (tests/delivery/test_ws_*.py) ride here —
      # they use the in-memory channel layer + faked revocation cache (no live Redis,
      # no Kafka, no daphne server), covering subprotocol negotiation / the close-code
      # table / auth → ready → event / resume_ack / frame_seq-gap drop_notice / the
      # drop-oldest queue / the ws-pusher fan-out.
      #
      # Also gated here (pure, CI-gated; the live round-trips are compose-only):
      #   * tests/ops/test_stream_control_harness.py — the OPS-5 (dynamic-TPS
      #     stopwatch), OPS-8 (WS drop-notice reconciliation + bounded memory),
      #     XCH content-equality, and SOAK-200 (RSS-slope / lag-p99 / tally /
      #     staleness) assertion LOGIC. The soak driver + demo import the SAME
      #     functions, so the compose verdict == the PR-lane verdict.
      #   * tests/delivery/test_xch_cross_channel.py — XCH-1/2 proven at the channel
      #     seam: the same envelopes through the ws-pusher fan-out vs the REST-
      #     delivered (strip_internal) shape, reconciled per event_id (no broker).
      #
      # COMPOSE-ONLY (NOT in any CI lane — the verify agent's demo-phase06.sh +
      # the attended/nightly soak): the LIVE OPS-4 pause/resume one-tick halt +
      # checkpoint + lease retention round-trip, the LIVE OPS-5 TPS stopwatch on a
      # running runner, the LIVE OPS-8 WS backpressure against a throttled socket,
      # the LIVE XCH 60s WS-tail vs REST-cursor harness, and SOAK-200 (1-hour
      # 200-TPS; ws process + Redis channel layer + Kafka + runner + sink host).
      # Their pass/fail LOGIC is the unit-gated harness above; the runner-side
      # OPS-4 tick semantics are gated by tests/runner/test_pause_resume.py +
      # tests/runner/test_resume_continuity.py (also in this lane).
      - name: Tests (pytest, unit lane)
        run: uv run pytest
      # Phase-4 Layer-3 GUARD (plugin-arch §8.4; phase exit criterion #4): every
      # builtin manifest is re-validated through the *real* engine in the sandboxed
      # dry run; the job fails if any builtin cannot sustain est_eps_per_shard >=
      # 1000 (MAN-D604). Closes the Phase-3 sequencing window — the builtin subset
      # published before the engine existed is retroactively L3-validated here.
      - name: Layer-3 GUARD — re-validate builtins through the dry run (§8.4)
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test
        run: uv run python manage.py revalidate_builtins_l3
      # INTEGRATION lane (testing-strategy §7.3): the permanent TEN attack
      # suite, raw-SQL RLS probes, and revocation stopwatch run under Postgres
      # (RLS-bearing, connecting as the non-owner dataforge_app role so FORCE
      # RLS bites) + Redis — the Phase 2 isolation gates, unskippable on every PR.
      - name: Provision app role + apply RLS migrations
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test_postgres
          DATABASE_URL: postgres://dataforge:dataforge@localhost:5432/dataforge
          MIGRATE_DATABASE_URL: postgres://dataforge:dataforge@localhost:5432/dataforge
          REDIS_URL: redis://localhost:6379/0
        run: |
          uv run python manage.py migrate --noinput
          uv run python manage.py provision_db_roles --app-password dataforge_app
      # Isolation gates as the NON-OWNER dataforge_app role: the cross-tenant attack
      # suite (auto-enrolling the new Phase-3 catalog/registry routes), raw-SQL RLS
      # probes, and revocation stopwatch. These prove RLS *bites* — global catalog/
      # registry rows are readable, workspace rows are scoped, foreign rows are 404.
      # tests/generation/test_postgres holds the Phase-4 ledger RLS + RANGE-partition
      # routing probes (database-schema §5.5, §9.5/§9.7): a foreign/unset workspace
      # GUC must see zero ledger rows, and writes must route to the daily partition
      # matching emitted_at. Those assertions only bite under the non-bypassing
      # dataforge_app role on real Postgres (they skip on the SQLite unit lane), so
      # they ride the isolation lane. The fixture (gen_ledger_ws) seeds NO global
      # scenario, so the runtime role can create its workspace under Class-W WITH CHECK.
      # tests/delivery is the Phase-5 delivery plane (delivery-channels §4-§5;
      # database-schema §6.1, §9.5/§9.7) on REAL Postgres + RLS + hourly RANGE
      # partitions — the path SQLite cannot exercise:
      #   * tests/delivery/test_postgres — the transactional COPY into event_buffer,
      #     per-stream monotonic buffer_seq + counter recovery, hourly partition
      #     routing, and the RLS-negative probes (foreign/unset GUC → zero rows);
      #   * tests/delivery/test_cursor.py — the REST cursor pull end to end over the
      #     partitioned buffer: byte-identical REPLAY (XCH-3 / INV-DEL-3), the 410
      #     cursor-expired logical floor AND dropped-partition (OPS-7 / INV-DEL-4,
      #     which is Postgres-only — it reads the partition catalog), 400 invalid,
      #     events:read enforcement, foreign-workspace 404 masking, exactly-20-key
      #     delivered output;
      #   * tests/delivery/test_sb3_strip_scan.py — the PERMANENT channel-parameterized
      #     SB-3 strip scan over every shipped channel's delivered output (no _df at
      #     any nesting; CON §8.2), run here against the real partitioned buffer so a
      #     leak is caught on production-faithful storage.
      # All bite only under the non-bypassing dataforge_app role on real Postgres
      # (the partition + RLS machinery is absent on SQLite); the buffer/cursor
      # fixtures seed no global scenario, so they ride the isolation lane.
      # tests/tenancy auto-enrolls the new Phase-5 events route in the cross-tenant
      # attack probe (foreign key → 404) and carries the explicit TEN §7.5(P5)
      # data-plane probes (foreign key → 404 AND revoked-scope → 403,
      # tests/tenancy/test_data_plane_probes_p5.py) — permanent, unskippable.
      # Phase 6 grows the suite: the new control-plane verbs (pause/resume/PATCH)
      # and the stats read are classified in access_policy so the route-coverage gate
      # and the cross-tenant probe auto-enroll them (foreign → 404); the explicit
      # TEN §7.5(P6) probes (tests/tenancy/test_data_plane_probes_p6.py: foreign
      # stats → 404 over key AND JWT, own-key control, WS-3 4404 close-code pin) are
      # permanent gates. tests/delivery now also carries the XCH-1/2 channel-seam
      # harness (test_xch_cross_channel.py) — WS-pusher vs REST content equality.
      # NOTE: tests/streams (Phase-5 control plane: lifecycle, watchdog, maintenance)
      # runs in the PUBLISH-PATH (owner) lane below, NOT here: its fixtures publish the
      # e-commerce builtin as a *global* (NULL-workspace) scenario, an owner-only write
      # (database-schema §9.6) the NOBYPASSRLS dataforge_app role cannot perform.
      # COMPOSE-ONLY (NOT in this lane): the §8.5 kill-test / failover OPS suite
      # (OPS-1/2 SIGKILL + takeover < 30s + fencing) and the OPS-3 stop-latency
      # stopwatch need Kafka + two runner replicas — they run in the verify agent's
      # compose demo (infra/scripts/demo-phase05.sh). The failover harness's pass/fail
      # LOGIC (gap/dup scan, takeover timing, fencing, stop latency) IS gated here:
      # tests/ops/test_failover_harness.py is pure and rides the unit lane above.
      - name: Integration tests — isolation lane (dataforge_app, RLS bites)
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test_postgres
          DATABASE_URL: postgres://dataforge_app:dataforge_app@localhost:5432/dataforge
          MIGRATE_DATABASE_URL: postgres://dataforge:dataforge@localhost:5432/dataforge
          REDIS_URL: redis://localhost:6379/0
        # tests/delivery rides the RLS lane for the Postgres-bearing paths (COPY,
        # cursor replay, stats RLS, the SB-3 strip scan, the XCH channel-seam, and the
        # Phase-6 WS cold-cache auth GUC-in-transaction probe under tests/delivery/
        # test_postgres). The async WebSocket *consumer/protocol* suites
        # (test_ws_consumer/test_ws_protocol/test_ws_pusher) are channel-layer +
        # protocol-behavior tests on the in-memory layer — fully covered in the fast
        # unit lane above; they are NOT RLS-bearing, and the WebsocketCommunicator +
        # transaction=True + background-task model is fragile against the Postgres test
        # DB, so they are deselected here (ignored), not re-run on Postgres.
        run: >-
          uv run pytest tests/tenancy tests/guards tests/ops
          tests/delivery
          tests/generation/test_postgres
          --ignore tests/delivery/test_ws_consumer.py
          --ignore tests/delivery/test_ws_protocol.py
          --ignore tests/delivery/test_ws_pusher.py
      # Publish-path lane as the OWNER role: the catalog/registry publish + schema-
      # derivation + registration suites exercise the manifest-publish transaction,
      # which in production runs as the platform owner (sync_builtin_scenarios via
      # MIGRATE_DATABASE_URL, database-schema §9.6) because writing *global*
      # (NULL-workspace) builtin rows is an owner-only operation — the runtime
      # dataforge_app role can never INSERT a global row (that backstop is what the
      # isolation lane above asserts). Running these as the owner is therefore the
      # production-faithful role for the publish path; FORCE RLS exempts the
      # superuser owner exactly as it does at deploy time. The contract (envelope)
      # suite is pure-Python and role-agnostic; it rides this lane.
      # The Phase-4 generation suite (batch API, ledger gapless sequence_no, pool
      # seeding, checkpoint/snapshot persistence, GOLD-A byte identity) arms a
      # workspace via the gen_workspace fixture, which publishes the e-commerce
      # builtin as a *global* (NULL-workspace) scenario — an owner-only write
      # (database-schema §9.6), exactly like sync_builtin_scenarios. It therefore
      # rides the publish-path (owner) lane on real Postgres, proving the ledger
      # writes, partition routing, and download shape against the partitioned table
      # (the RLS-negative ledger probes live in the isolation lane above instead).
      # The Phase-5 control plane (tests/streams: lifecycle T1-T13, the lease-expiry
      # watchdog → T4/T11, the partition-maintenance beat jobs over the real ledger +
      # hourly event_buffer partitions) likewise publishes the builtin scenario per
      # fixture (an owner-only global write), so it rides this owner lane too.
      - name: Integration tests — publish-path lane (owner; production-faithful)
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test_postgres
          DATABASE_URL: postgres://dataforge:dataforge@localhost:5432/dataforge
          MIGRATE_DATABASE_URL: postgres://dataforge:dataforge@localhost:5432/dataforge
          REDIS_URL: redis://localhost:6379/0
        run: >-
          uv run pytest tests/catalog tests/registry tests/contract tests/streams
          tests/generation/test_api.py tests/generation/test_batch.py
          tests/generation/test_golden.py tests/generation/test_checkpoint_snapshot.py

  frontend:
    name: frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint (eslint)
        run: npm run lint
      - name: Type-check (tsc)
        run: npx tsc --noEmit
      - name: Tests (vitest)
        run: npm test -- --run

  openapi-artifact:
    name: openapi-artifact
    needs: changes
    # Contract jobs run when either side changes (ADR-0001).
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Sync dependencies
        run: uv sync
      - name: Regenerate OpenAPI schema (drf-spectacular)
        run: uv run python manage.py spectacular --file schema/openapi.yaml
      - name: Fail on uncommitted schema drift (ADR-0014 lockstep)
        run: git diff --exit-code -- schema/openapi.yaml
      # Phase-3 contract artifacts: the envelope 1.0 JSON Schema (event-model EV-6)
      # and the Manifest v0 JSON Schema (scenario-plugin §9.1) are committed CI
      # artifacts like openapi.yaml. `--check` regenerates from the source-of-truth
      # generator and fails if the committed file drifts — keeping them current.
      - name: Fail on envelope-1.0 schema artifact drift (EV-6)
        run: uv run python manage.py generate_envelope_schema --check
      - name: Fail on manifest-v0 schema artifact drift (§9.1)
        run: uv run python manage.py generate_manifest_schema --check
      # Phase 6: the WS frame JSON Schema (delivery-channels §6.3; api-spec §5.5, T-3)
      # is the committed contract for the dataforge.events.v1 protocol. WS frames are
      # out of OpenAPI scope by design (T-7); this artifact + the cross-channel suite
      # carry the contract. `--check` fails the build if the committed file drifts.
      - name: Fail on ws-protocol-v1 schema artifact drift (§5.5)
        run: uv run python manage.py generate_ws_protocol_schema --check
      # Belt-and-suspenders: assert the on-disk artifacts equal the generators
      # even if a future change skips the management-command path.
      - name: Schema artifacts match the working tree
        run: git diff --exit-code -- schema/envelope-1.0.schema.json catalog/schema/manifest-v0.schema.json schema/ws-protocol-v1.schema.json

  folder-lint:
    name: folder-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Tree matches D19 (project-folder-structure.md)
        run: python3 infra/scripts/folder_lint.py
