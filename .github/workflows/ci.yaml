# DataForge CI — ONE path-filtered pipeline (ADR-0001; deployment-architecture §7).
# Backend paths trigger the backend job, frontend paths the frontend job,
# either side triggers the OpenAPI contract-artifact job (ADR-0014 lockstep);
# folder-lint runs on every PR (Phase 1 exit criterion 5).
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yaml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yaml'

  backend:
    name: backend
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    # Service containers for the Phase 2 integration lane: the cross-tenant
    # attack suite, raw-SQL RLS probes, and revocation stopwatch require a real
    # Postgres (RLS is a Postgres construct) and Redis (revocation cache).
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dataforge
          POSTGRES_PASSWORD: dataforge
          POSTGRES_DB: dataforge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dataforge -d dataforge"
          --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Sync dependencies
        run: uv sync
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Type-check (mypy)
        run: uv run mypy .
      - name: Import-boundary contracts (import-linter, backend-architecture §3.2)
        run: uv run lint-imports
      # UNIT lane: in-memory SQLite, hermetic and fast (testing-strategy §2).
      - name: Tests (pytest, unit lane)
        run: uv run pytest
      # INTEGRATION lane (testing-strategy §7.3): the permanent TEN attack
      # suite, raw-SQL RLS probes, and revocation stopwatch run under Postgres
      # (RLS-bearing, connecting as the non-owner dataforge_app role so FORCE
      # RLS bites) + Redis — the Phase 2 isolation gates, unskippable on every PR.
      - name: Provision app role + apply RLS migrations
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test_postgres
          DATABASE_URL: postgres://dataforge:dataforge@localhost:5432/dataforge
          MIGRATE_DATABASE_URL: postgres://dataforge:dataforge@localhost:5432/dataforge
          REDIS_URL: redis://localhost:6379/0
        run: |
          uv run python manage.py migrate --noinput
          uv run python manage.py provision_db_roles --app-password dataforge_app
      - name: Integration tests (Postgres RLS + Redis)
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test_postgres
          DATABASE_URL: postgres://dataforge_app:dataforge_app@localhost:5432/dataforge
          MIGRATE_DATABASE_URL: postgres://dataforge:dataforge@localhost:5432/dataforge
          REDIS_URL: redis://localhost:6379/0
        run: uv run pytest tests/tenancy tests/guards tests/ops

  frontend:
    name: frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint (eslint)
        run: npm run lint
      - name: Type-check (tsc)
        run: npx tsc --noEmit
      - name: Tests (vitest)
        run: npm test -- --run

  openapi-artifact:
    name: openapi-artifact
    needs: changes
    # Contract jobs run when either side changes (ADR-0001).
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Sync dependencies
        run: uv sync
      - name: Regenerate OpenAPI schema (drf-spectacular)
        run: uv run python manage.py spectacular --file schema/openapi.yaml
      - name: Fail on uncommitted schema drift (ADR-0014 lockstep)
        run: git diff --exit-code -- schema/openapi.yaml

  folder-lint:
    name: folder-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Tree matches D19 (project-folder-structure.md)
        run: python3 infra/scripts/folder_lint.py
