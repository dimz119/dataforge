# DataForge — Fly.io PRODUCTION app config (deployment-architecture.md §3, ADR-0015).
#
# Phase 11 (P11-10) productionizes the Phase-1 throwaway (fly.toml): the full
# four process-group topology (web/ws/worker/runner) running the ONE backend
# `runtime` image (D-2), the release_command (migrate → provision_db_roles →
# provision_kafka_topics → sync_builtin_scenarios, §7.3), per-process health
# checks (§3.2), per-process [[vm]] sizing/counts (GA table §3.2), and the
# [[metrics]] scrape config (M-1, observability §4) — one scrape target per
# process group on DF_METRICS_PORT 9091 (web serves /metrics on its shared
# WSGI 8000 instead; see the [[metrics]] comments below).
#
# ARTIFACT-ONLY for Phase 11 (USER-DECIDED SCOPE): this file is REVIEWED, not
# executed against real Fly — the live prod deploy + the on-prod 5k gate are
# skipped this phase. It parses as TOML and matches the §3.2 contract verbatim
# so the eventual deploy is a no-surprise `flyctl deploy`.
#
# SECRETS RULE S-2: no secret value EVER appears here. The [env] block carries
# NON-SECRET config only. Everything in infra/deploy/README.md "Fly secrets"
# is set via `fly secrets set` (names only documented; no values committed).
# The internal-only Kafka broker app is fly.kafka.toml (this file's companion).

app = "dataforge"
primary_region = "iad"

[build]
  # Built from backend/ as the build context (backend/Dockerfile, target
  # `runtime`/`prod`). The SPA is baked in as a CI artifact at
  # backend/frontend-dist/ before the image build (deployment-architecture §8.1).
  # See infra/deploy/README.md for the exact `flyctl deploy` invocation.
  dockerfile = "Dockerfile"
  build-target = "prod"

# --- Process groups: one image, many commands (D-2, §3.2) --------------------
[processes]
  # WSGI control plane + REST event pulls + WhiteNoise SPA serving (§3.3).
  web    = "gunicorn config.wsgi:application -b [::]:8000 -w 4 --timeout 60"
  # ASGI Channels: WebSocket tails only (separate, independently scalable tier).
  ws     = "uvicorn config.asgi:application --host :: --port 8001 --workers 2"
  # Celery control plane; beat embedded under the Redis singleton lock
  # (backend-architecture §7.4) so a single schedule runs even if worker scales.
  worker = "celery -A config worker -B -Q control,lifecycle,validation,exports,maintenance"
  # Data plane: shard runner processes (behavior + chaos) + the MVP sink
  # consumers (rest_buffer buffer-writer + ws-pusher) co-located via --role all
  # (§3.3). The pre-decided 5th `sink` split is config-only — see README "sink
  # split trigger"; until it fires these four groups are the complete prod set.
  runner = "python -m runner --role all"

# --- Release command: runs once per deploy, before machine replacement (§7.3)
[deploy]
  # migrate (N-1 compatible, RB-3) → provision_db_roles (re-grant the NOBYPASSRLS
  # runtime role) → provision_kafka_topics (idempotent) → sync_builtin_scenarios
  # (registers builtin manifests AFTER migrate, as the maintenance/owner role).
  # MIGRATE_DATABASE_URL (owner role) is the secret migrate/provision use; the
  # process commands above run as the NOBYPASSRLS DATABASE_URL role.
  release_command = "bash -c 'python manage.py migrate --noinput && python manage.py provision_db_roles && python manage.py provision_kafka_topics && python manage.py sync_builtin_scenarios'"
  strategy = "rolling"

# --- Non-secret config shared by all process groups (D-3, §6.3) --------------
# SECRETS go through `fly secrets set` ONLY (S-2). Anything here is public config.
[env]
  DF_ENV = "prod"
  DJANGO_SETTINGS_MODULE = "config.settings.prod"
  ALLOWED_HOSTS = "app.dataforge.dev,dataforge.fly.dev"
  CONSOLE_BASE_URL = "https://app.dataforge.dev"
  # KAFKA_BOOTSTRAP_SERVERS is config, not a secret (D-3, §5), until the managed
  # cluster adds SASL creds. The internal broker app has no public IP (§3.4).
  KAFKA_BOOTSTRAP_SERVERS = "dataforge-kafka.internal:9092"
  # df_ metrics side-port for ws/worker/runner exposers (observability §4); web
  # serves /metrics through Django on 8000. 9091 is the platform default.
  DF_METRICS_PORT = "9091"
  SENTRY_ENVIRONMENT = "prod"
  LOG_LEVEL = "info"

# --- web: public HTTPS service (REST + SPA), GET /readyz health (§3.2) --------
[http_service]
  processes = ["web"]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 2

  # /readyz gates on Postgres + Redis (Kafka non-gating) per observability §6.1.
  [[http_service.checks]]
    interval = "10s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/readyz"

# --- ws: public WSS service (Channels ASGI tails), GET /healthz (§3.2) --------
# A second http_service is not allowed; ws is exposed via its own [[services]]
# block with TLS handler + an HTTP health check on /healthz (liveness-only:
# the ws tier degrades to reconnect+resume-from-cursor, ADR-0016/0013).
[[services]]
  processes = ["ws"]
  protocol = "tcp"
  internal_port = 8001
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 2

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
    force_https = true

  [[services.http_checks]]
    interval = "10s"
    timeout = "5s"
    grace_period = "15s"
    method = "GET"
    path = "/healthz"

# --- worker: no public service; TCP health sidecar on :8092 (§3.2) -----------
[[services]]
  processes = ["worker"]
  protocol = "tcp"
  internal_port = 8092

  [[services.tcp_checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "20s"

# --- runner: no public service; internal HTTP health on :8081 (§3.2, §8.1) ---
[[services]]
  processes = ["runner"]
  protocol = "tcp"
  internal_port = 8081

  [[services.http_checks]]
    interval = "10s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/healthz"

# --- Prometheus scrape config (M-1, observability §4) ------------------------
# ONE scrape target per PROCESS GROUP, not per logical service. DataForge has
# TWO exposer shapes: web serves df_ web metrics through Django on the shared
# WSGI port 8000; ws/worker/runner expose on the 9091 side port. The runner
# process hosts buffer-writer + ws-pusher threads, so all three df_ metric
# families (runner/buffer/ws) share its ONE 9091 exposer — one [[metrics]]
# target for the whole runner group. Each [[metrics]] block is scoped to its
# process group via `processes` so Fly scrapes each group on the right port.
[[metrics]]
  port = 8000
  path = "/metrics"
  processes = ["web"]

[[metrics]]
  port = 9091
  path = "/metrics"
  processes = ["ws"]

[[metrics]]
  port = 9091
  path = "/metrics"
  processes = ["worker"]

# runner hosts the runner + buffer + ws-pusher families on ONE 9091 exposer.
[[metrics]]
  port = 9091
  path = "/metrics"
  processes = ["runner"]

# --- Machine sizing + counts per process group (GA table, §3.2) --------------
[[vm]]
  processes = ["web"]
  size = "shared-cpu-2x"
  memory = "2048mb"
  # count 2: rolling-deploy continuity + machine-level redundancy, not throughput.

[[vm]]
  processes = ["ws"]
  size = "shared-cpu-2x"
  memory = "2048mb"

[[vm]]
  processes = ["worker"]
  # Same class as runners deliberately: layer-3 dry runs measure est_eps_per_shard
  # on this class so the ≥1000 ev/s floor transfers to runner capacity planning.
  size = "performance-2x"
  memory = "4096mb"

[[vm]]
  processes = ["runner"]
  size = "performance-2x"
  memory = "4096mb"

# kill_timeout / count notes (set per group at deploy via `flyctl scale`,
# documented in infra/deploy/README.md because fly.toml [[vm]] does not carry
# kill_timeout — it is a machine-config field):
#   web    count 2  kill_timeout 15s
#   ws     count 2  kill_timeout 30s  (socket drain; clients reconnect+resume)
#   worker count 1  kill_timeout 60s  (finish task or requeue; beat pinned here)
#   runner count 2  kill_timeout 30s  (checkpoint + lease release on SIGTERM, D-5)
