# DataForge alert rules (Phase 11, P11-06).
#
# All 16 FROZEN alert names from observability.md §9, with the exact conditions
# from §8 (error-budget burn policy) and §9 (per-alert conditions). The three
# SLO burn alerts (ApiAvailabilityBurn / DeliveryFreshnessBurn / WsConnectBurn)
# use the Google-SRE multiwindow / multi-burn-rate pattern (§8):
#
#   page   : burn > 14.4x over 1h  AND  burn > 14.4x over 5m   (2% budget/hour)
#   page   : burn > 6x    over 6h  AND  burn > 6x    over 30m
#   ticket : burn > 3x    over 24h AND  burn > 3x    over 2h
#   ticket : burn > 1x    over 3d  AND  burn > 1x    over 6h
#
# burn rate = errorRatio / errorBudget, where
#   errorRatio  = 1 - sli:<slo>:ratio_rate<window>   (recorded in slo-recording-rules.yml)
#   errorBudget = 1 - target                          (SLO-1 .005, SLO-2 .01, SLO-3 .005)
#
# The short-window confirmation legs (5m/30m/2h/6h) suppress flapping per the SRE
# workbook; each tier carries a distinct severity + alertname suffix but the
# user-facing/paging alertname is the frozen base name (label `alertname` from
# the `alert:` key plus a `burn_window` label distinguishing tiers).
#
# Validated by yaml.safe_load (artifact-only; not run against a live Prometheus
# in this phase per the build scope). PromQL references the exact df_ metric
# names + labels from observation/infra/metrics.py.

groups:
  # =======================================================================
  # SLO-1 — ApiAvailabilityBurn (page)  [observability.md §9, §8]
  # =======================================================================
  - name: dataforge_alerts_api_availability_burn
    rules:
      - alert: ApiAvailabilityBurn
        expr: |
          (
            (1 - sli:slo1_api_availability:ratio_rate1h) > (14.4 * (1 - 0.995))
            and
            (1 - sli:slo1_api_availability:ratio_rate5m) > (14.4 * (1 - 0.995))
          )
        for: 2m
        labels:
          severity: page
          slo: slo1_api_availability
          burn_window: 1h_5m
        annotations:
          summary: "SLO-1 control-plane availability burning >14.4x (1h and 5m)"
          description: "Fast burn: >2% of the 30-day error budget per hour on /api/v1/*. Runbook: infra/runbooks/ApiAvailabilityBurn.md"
          runbook: "infra/runbooks/ApiAvailabilityBurn.md"
      - alert: ApiAvailabilityBurn
        expr: |
          (
            (1 - sli:slo1_api_availability:ratio_rate6h) > (6 * (1 - 0.995))
            and
            (1 - sli:slo1_api_availability:ratio_rate1h) > (6 * (1 - 0.995))
          )
        for: 15m
        labels:
          severity: page
          slo: slo1_api_availability
          burn_window: 6h_1h
        annotations:
          summary: "SLO-1 control-plane availability burning >6x (6h and 1h)"
          description: "Sustained burn of the control-plane error budget. Runbook: infra/runbooks/ApiAvailabilityBurn.md"
          runbook: "infra/runbooks/ApiAvailabilityBurn.md"
      - alert: ApiAvailabilityBurn
        expr: |
          (
            (1 - sli:slo1_api_availability:ratio_rate24h) > (3 * (1 - 0.995))
            and
            (1 - sli:slo1_api_availability:ratio_rate6h) > (3 * (1 - 0.995))
          )
        for: 1h
        labels:
          severity: ticket
          slo: slo1_api_availability
          burn_window: 24h_6h
        annotations:
          summary: "SLO-1 control-plane availability burning >3x (24h and 6h)"
          description: "Slow burn ticket for the control-plane error budget. Runbook: infra/runbooks/ApiAvailabilityBurn.md"
          runbook: "infra/runbooks/ApiAvailabilityBurn.md"
      - alert: ApiAvailabilityBurn
        expr: |
          (
            (1 - sli:slo1_api_availability:ratio_rate3d) > (1 * (1 - 0.995))
            and
            (1 - sli:slo1_api_availability:ratio_rate6h) > (1 * (1 - 0.995))
          )
        for: 3h
        labels:
          severity: ticket
          slo: slo1_api_availability
          burn_window: 3d_6h
        annotations:
          summary: "SLO-1 control-plane availability burning >1x (3d and 6h)"
          description: "Long-window budget exhaustion ticket. Runbook: infra/runbooks/ApiAvailabilityBurn.md"
          runbook: "infra/runbooks/ApiAvailabilityBurn.md"

  # =======================================================================
  # SLO-2 — DeliveryFreshnessBurn (page)  [observability.md §9, §8]
  # =======================================================================
  - name: dataforge_alerts_delivery_freshness_burn
    rules:
      - alert: DeliveryFreshnessBurn
        expr: |
          (
            (1 - sli:slo2_delivery_success:ratio_rate1h) > (14.4 * (1 - 0.99))
            and
            (1 - sli:slo2_delivery_success:ratio_rate5m) > (14.4 * (1 - 0.99))
          )
        for: 2m
        labels:
          severity: page
          slo: slo2_delivery_success
          burn_window: 1h_5m
        annotations:
          summary: "SLO-2 delivery freshness burning >14.4x (1h and 5m)"
          description: "Fast burn: events not visible to the REST cursor within 30s. Runbook: infra/runbooks/DeliveryFreshnessBurn.md"
          runbook: "infra/runbooks/DeliveryFreshnessBurn.md"
      - alert: DeliveryFreshnessBurn
        expr: |
          (
            (1 - sli:slo2_delivery_success:ratio_rate6h) > (6 * (1 - 0.99))
            and
            (1 - sli:slo2_delivery_success:ratio_rate1h) > (6 * (1 - 0.99))
          )
        for: 15m
        labels:
          severity: page
          slo: slo2_delivery_success
          burn_window: 6h_1h
        annotations:
          summary: "SLO-2 delivery freshness burning >6x (6h and 1h)"
          description: "Sustained delivery-lag burn. Runbook: infra/runbooks/DeliveryFreshnessBurn.md"
          runbook: "infra/runbooks/DeliveryFreshnessBurn.md"
      - alert: DeliveryFreshnessBurn
        expr: |
          (
            (1 - sli:slo2_delivery_success:ratio_rate24h) > (3 * (1 - 0.99))
            and
            (1 - sli:slo2_delivery_success:ratio_rate6h) > (3 * (1 - 0.99))
          )
        for: 1h
        labels:
          severity: ticket
          slo: slo2_delivery_success
          burn_window: 24h_6h
        annotations:
          summary: "SLO-2 delivery freshness burning >3x (24h and 6h)"
          description: "Slow delivery-lag burn ticket. Runbook: infra/runbooks/DeliveryFreshnessBurn.md"
          runbook: "infra/runbooks/DeliveryFreshnessBurn.md"
      - alert: DeliveryFreshnessBurn
        expr: |
          (
            (1 - sli:slo2_delivery_success:ratio_rate3d) > (1 * (1 - 0.99))
            and
            (1 - sli:slo2_delivery_success:ratio_rate6h) > (1 * (1 - 0.99))
          )
        for: 3h
        labels:
          severity: ticket
          slo: slo2_delivery_success
          burn_window: 3d_6h
        annotations:
          summary: "SLO-2 delivery freshness burning >1x (3d and 6h)"
          description: "Long-window delivery budget exhaustion ticket. Runbook: infra/runbooks/DeliveryFreshnessBurn.md"
          runbook: "infra/runbooks/DeliveryFreshnessBurn.md"

