# Grafana dashboard provider (Phase 11, P11-06).
# Loads every JSON under /var/lib/grafana/dashboards (mounted from
# infra/observability/grafana/dashboards) into the "DataForge" folder.
apiVersion: 1

providers:
  - name: dataforge
    orgId: 1
    folder: DataForge
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
